      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: "hsl(210 20% 98%)",
              foreground: "hsl(222 47% 11%)",
              card: "hsl(0 0% 100%)",
              muted: "hsl(210 15% 95%)",
              border: "hsl(210 20% 90%)",
              primary: "hsl(200 80% 50%)",
              textMuted: "hsl(215 16% 47%)",
            },
            fontFamily: {
              sans: ["Inter", "system-ui"],
              display: ["Plus Jakarta Sans", "system-ui"],
            },
            backgroundImage: {
              "gradient-primary":
                "linear-gradient(135deg, hsla(200,80%,50%,0.94), hsl(175 60% 45%))",
            },
          },
        },
      };

    <style>
      :root {
        --gradient-primary: linear-gradient(
          135deg,
          hsla(200, 80%, 50%, 0.94),
          hsl(175 60% 45%)
        );
      }

      input:disabled,
      textarea:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        background-color: hsl(210 15% 95%) !important;
      }

      .notification {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 20px;
        border-radius: 12px;
        font-weight: bold;
        z-index: 1000;
        animation: slideIn 0.3s ease-out;
      }

      .notification.success {
        background-color: #10b981;
        color: white;
      }

      .notification.error {
        background-color: #ef4444;
        color: white;
      }

      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
    </style>
  </head>

                  class="w-full px-4 py-2 rounded-xl border border-border bg-muted focus:outline-none focus:ring-2 focus:ring-primary"
                  placeholder="••••••••"
                  id="currentPassword"
                />
              </div>

              !-- Новий пароль --
              <div>
                <label class="text-sm font-medium block mb-1"
                  >Новий пароль</label
                >
                <input
                  type="password"
                  class="w-full px-4 py-2 rounded-xl border border-border bg-muted focus:outline-none focus:ring-2 focus:ring-primary"
                  placeholder="••••••••"
                  id="newPassword"
                />
              </div>

              !-- Підтвердження --
              <div>
                <label class="text-sm font-medium block mb-1"
                  >Підтвердження пароля</label
                >
                <input
                  type="password"
                  class="w-full px-4 py-2 rounded-xl border border-border bg-muted focus:outline-none focus:ring-2 focus:ring-primary"
                  placeholder="••••••••"
                  id="confirmPassword"
                />
              </div>
            </div>

            <button
              id="changePasswordBtn"
              class="mt-4 px-5 py-2 rounded-xl text-white font-semibold flex items-center gap-2 transition-all duration-300 ease-in-out hover:-translate-y-1 hover:shadow-xl active:translate-y-0 active:shadow-md"
              style="background: var(--gradient-primary)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2l7 4v6c0 5-3 9-7 10-4-1-7-5-7-10V6l7-4z" />
              </svg>

              Змінити пароль
            </button>
          </div> -->
        </div>
      </main>
    </div>

    <script>
      const editBtn = document.getElementById("editProfileBtn");
      const actionButtons = document.getElementById("profileActionButtons");
      const photoBtn = document.getElementById("changePhotoBlock");
      const cancelBtn = document.getElementById("cancelProfileBtn");
      const saveBtn = document.getElementById("saveProfileBtn");

      // Поля профіля
      const profileFields = [
        document.getElementById("firstName"),
        document.getElementById("lastName"),
        document.getElementById("emailField"),
        document.getElementById("phoneField"),
        document.getElementById("locationField"),
        document.getElementById("aboutTextarea"),
      ];

      // Оригінальні дані (для скасування)
      let originalData = {};
      document.getElementById("logoutLink").onclick = () => {
        localStorage.removeItem("access_token");
          localStorage.removeItem("token");
        localStorage.removeItem("current_user_id");
        window.location.href = "/index";
      };
      
      // Функція для показу повідомлення
      function showNotification(message, type = "success") {
        const notification = document.createElement("div");
        notification.className = `notification ${type}`;
        notification.textContent = message;
        document.body.appendChild(notification);

        setTimeout(() => {
          notification.remove();
        }, 3000);
      }

      // Отримуємо token з localStorage
      function getToken() {
        // support both keys for backward compatibility
        return localStorage.getItem("token") || localStorage.getItem("access_token");
      }

      // Завантажуємо дані з сервера при загрузці сторінки
      window.addEventListener("DOMContentLoaded", () => {
        loadProfileData();
      });

      // Функція для завантаження даних з сервера
      async function loadProfileData() {
        const token = getToken();
        if (!token) {
          showNotification(
            "Ошибка: не найден токен аутентификации",
            "error",
          );
          return;
        }

        try {
          const response = await fetch(`/users/me/profile?token=${token}`);

          if (!response.ok) {
            if (response.status === 401) {
              showNotification("Ошибка: недействительный токен", "error");
              // Редирект на логін
              setTimeout(() => {
                window.location.href = "/login";
              }, 2000);
              return;
            }
            throw new Error(`Ошибка: ${response.status}`);
          }

          const data = await response.json();

          // Заповнюємо поля
          document.getElementById("firstName").value = data.firstName || "";
          document.getElementById("lastName").value = data.lastName || "";
          document.getElementById("emailField").value = data.email || "";
          document.getElementById("phoneField").value = data.phone || "";
          document.getElementById("locationField").value = data.location || "";
          document.getElementById("aboutTextarea").value = data.about || "";

          // Зберігаємо оригіналки для скасування
          originalData = { ...data };

          // Оновлюємо перший символ аватара
          if (data.firstName && data.firstName.length > 0) {
            document.getElementById("avatarPreview").textContent =
              data.firstName.charAt(0).toUpperCase();
          }
        } catch (error) {
          console.error("Ошибка при загрузке профиля:", error);
          showNotification("Ошибка при загрузке профиля", "error");
        }
      }

      // Натиснули "Змінити дані"
      editBtn.onclick = () => {
        actionButtons.classList.remove("hidden");
        photoBtn.classList.remove("hidden");
        // Включаємо всі поля
        profileFields.forEach((field) => {
          field.disabled = false;
        });
      };

      // Натиснули "Скасувати"
      cancelBtn.onclick = () => {
        actionButtons.classList.add("hidden");
        photoBtn.classList.add("hidden");
        // Заблоковуємо всі поля
        profileFields.forEach((field) => {
          field.disabled = true;
        });
        // Відновлюємо оригінальні дані
        document.getElementById("firstName").value =
          originalData.firstName || "";
        document.getElementById("lastName").value = originalData.lastName || "";
        document.getElementById("emailField").value = originalData.email || "";
        document.getElementById("phoneField").value = originalData.phone || "";
        document.getElementById("locationField").value =
          originalData.location || "";
        document.getElementById("aboutTextarea").value =
          originalData.about || "";
      };

      // Натиснули "Зберегти профіль"
      saveBtn.onclick = async () => {
        const token = getToken();
        if (!token) {
          showNotification("Ошибка: не найдено токена", "error");
          return;
        }
        document.getElementById("logoutLink").onclick = () => {
          localStorage.removeItem("access_token");
          localStorage.removeItem("token");
          localStorage.removeItem("current_user_id");
          window.location.href = "/index";
        };
        // Збираємо дані
        const profileData = {
          firstName: document.getElementById("firstName").value,
          lastName: document.getElementById("lastName").value,
          phone: document.getElementById("phoneField").value,
          location: document.getElementById("locationField").value,
          about: document.getElementById("aboutTextarea").value,
        };

        try {
          // Відправляємо на сервер
          const response = await fetch(`/users/update?token=${token}`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(profileData),
          });

          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.detail || `Ошибка: ${response.status}`);
          }

          // Успіш! Оновлюємо оригіналки
          await loadProfileData();

          // Приховуємо кнопки дій
          actionButtons.classList.add("hidden");
          photoBtn.classList.add("hidden");

          // Заблоковуємо всі поля
          profileFields.forEach((field) => {
            field.disabled = true;
          });

          // Показуємо повідомлення про успіх
          showNotification("✓ Профиль успешно сохранен!", "success");
        } catch (error) {
          console.error("Ошибка при сохранении профиля:", error);
          showNotification(`Ошибка: ${error.message}`, "error");
        }
      };
      const about = document.getElementById("aboutTextarea");
const counter = document.getElementById("aboutCounter");

about.addEventListener("input", () => {
  counter.textContent = about.value.length + " / 1000";
});
    </script>
  </body>
</html>

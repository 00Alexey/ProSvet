<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>ProSvet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Design Tokens -->
    <style>
      :root {
        --background: 210 20% 98%;
        --foreground: 220 25% 10%;
        --card: 0 0% 100%;
        --primary: 200 80% 50%;
        --secondary: 210 15% 93%;
        --muted: 210 15% 95%;
        --accent: 175 60% 45%;
        --border: 210 20% 90%;
        --radius: 0.75rem;

        --gradient-primary: linear-gradient(
          135deg,
          hsla(200, 80%, 50%, 0.941),
          hsl(175 60% 45%)
        );

        --gradient-hero: linear-gradient(
          160deg,
          hsl(210 20% 98%) 0%,
          hsl(200 40% 95%) 100%
        );
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        background: hsl(var(--background));
        color: hsl(var(--foreground));
      }

      h1,
      h2,
      h3 {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <header
      class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b"
      style="border-color: hsl(var(--border))"
    >
      <div
        class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between"
      >
        <!-- Logo -->
        <div class="h-16 flex items-center px-6 border-b border-border">
          <div
            class="w-10 h-10 rounded-xl flex items-center justify-center overflow-hidden"
          >
            <img
              src="static/goose.jpg"
              alt="ProSvet Logo"
              class="w-6 h-6 object-contain"
            />
          </div>

          <span class="ml-3 font-display font-bold text-xl">ProSvet</span>
          <div class="absolute top-16 left-0 w-full h-px bg-border"></div>
        </div>
        <!-- Actions -->
        <div class="flex items-center gap-4">
          <a
            href="/login"
            class="inline-block px-4 py-2 rounded-xl text-sm font-medium text-gray-500 transition-all duration-300 ease-in-out"
            onmouseover="
              this.style.backgroundColor = 'rgb(46, 184, 172)';
              this.style.color = 'white';
              this.style.transform = 'scale(1.05)';
            "
            onmouseout="
              this.style.backgroundColor = '';
              this.style.color = 'rgb(107,114,128)';
              this.style.transform = 'scale(1)';
            "
          >
            Войти
          </a>

          <a
            href="/register"
            class="px-4 py-2 rounded-lg text-white font-medium shadow-md transition hover:scale-[1.03]"
            style="background: var(--gradient-primary)"
          >
            Регистрация
          </a>
        </div>
      </div>
    </header>

    <!-- HERO -->
    <section
      class="pt-32 pb-28 text-center"
      style="background: var(--gradient-hero)"
    >
      <div class="max-w-4xl mx-auto px-6">
        <!-- Badge -->
        <div
          class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-sm mb-6"
          style="
            background: hsl(var(--primary) / 0.1);
            color: hsl(var(--primary));
          "
        >
          <span class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span>
          Храните и делитесь файлами легко
        </div>

        <!-- Title -->
        <h1 class="text-5xl md:text-6xl font-extrabold leading-tight mb-6">
          Ваш онлайн-<span
            class="bg-clip-text text-transparent"
            style="background-image: var(--gradient-primary)"
            >блокнот</span
          ><br />
          для видео и документов
        </h1>

        <!-- Subtitle -->
        <p class="text-lg text-gray-600 mb-12">
          Удобный сервис для хранения, организации и обмена видеофайлами и
          документами. Создайте папки, загружайте файлы и управляйте доступом.
        </p>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row justify-center gap-4">
          <a
            href="/register"
            class="inline-block px-10 py-3 rounded-xl text-white font-semibold shadow-lg transition hover:scale-[1.03]"
            style="background: var(--gradient-primary)"
          >
            Начать бесплатно →
          </a>

          <button
            class="px-10 py-3 rounded-xl font-semibold border transition hover:bg-cyan-50"
            style="
              border-color: hsl(var(--primary));
              color: hsl(var(--primary));
            "
          >
            Просмотреть публичное
          </button>
        </div>
      </div>
    </section>

    <!-- MOCK DASHBOARD -->
    <section class="pb-24">
      <div class="max-w-6xl mx-auto px-6">
        <div
          class="bg-white rounded-2xl shadow-xl border overflow-hidden"
          style="border-color: hsl(var(--border))"
        >
          <!-- Window Header -->
          <div
            class="flex items-center gap-2 px-4 py-3 border-b"
            style="border-color: hsl(var(--border))"
          >
            <span class="w-3 h-3 rounded-full bg-red-400"></span>
            <span class="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span class="w-3 h-3 rounded-full bg-green-400"></span>
          </div>

          <!-- Cards -->
          <div
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 p-6"
            id="folders-grid"
          >
            <!-- Folder -->
            <div
              class="bg-white rounded-xl border p-4 shadow hover:-translate-y-1 transition"
              style="border-color: hsl(var(--border))"
            ></div>
          </div>
        </div>
      </div>
    </section>
    <footer
      class="border-t border-border py-8 text-center text-sm text-gray-500"
    >
      𝕸𝖆𝖐$ 2026 ProSvet
    </footer>
    <script>
      function renderStars(rating) {
        const fullStars = Math.floor(rating);
        const hasHalf = rating % 1 >= 0.5;
        let stars = "";
        for (let i = 0; i < fullStars; i++) stars += "★";
        if (hasHalf) stars += "☆";
        while (stars.length < 5) stars += "☆";
        return stars.substring(0, 5);
      }

      document.addEventListener("DOMContentLoaded", function () {
        fetch("/files/public")
          .then((response) => response.json())
          .then((data) => {
            const grid = document.getElementById("folders-grid");
            grid.innerHTML = ""; // Очистити існуючі карточки

            // Фільтруємо тільки папки
            const folders = data.filter((item) => item.type === "folder");

            folders.forEach((folder) => {
              const card = document.createElement("div");
              card.className =
                "bg-white rounded-xl border p-4 shadow hover:-translate-y-1 transition";
              card.style.borderColor = "hsl(var(--border))";

              // Створюємо HTML для карточки
              card.innerHTML = `
<div class="flex justify-between items-start">
  <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center">
    <svg xmlns="http://www.w3.org/2000/svg" 
         class="w-6 h-6 text-primary" 
         viewBox="0 0 24 24" fill="none" 
         stroke="currentColor" stroke-width="2">
      <path d="M3 7a2 2 0 0 1 2-2h4l2 2h10a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    </svg>
  </div>
</div>

<h3 class="font-display font-semibold mt-3 truncate">
  ${folder.name}
</h3>

<p class="font-semibold text-sm text-gray-500">
  файлів ${folder.file_count || 0}
</p>

<p class="font-semibold text-sm text-yellow-500">
  ${renderStars(folder.average_rating || 0)}
  <span class="text-gray-500">(${folder.rating_count || 0})</span>
</p>

<p class="flex items-center justify-between font-semibold text-sm text-gray-500">

  <span class="flex items-center gap-1">
    ${folder.comment_count || 0}
    <svg xmlns="http://www.w3.org/2000/svg" 
         class="w-4 h-4 text-gray-400" 
         fill="none" viewBox="0 0 24 24" 
         stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="14" rx="2" ry="2"/>
      <path d="M7 21l3-4h8"/>
    </svg>
  </span>

  <svg xmlns="http://www.w3.org/2000/svg"
       class="w-4 h-4 text-gray-400"
       viewBox="0 0 24 24"
       fill="none"
       stroke="currentColor"
       stroke-width="2">
    <circle cx="12" cy="12" r="10" />
    <path d="M2 12h20" />
    <path d="M12 2a15 15 0 0 1 0 20" />
    <path d="M12 2a15 15 0 0 0 0 20" />
  </svg>

</p>
`;

              grid.appendChild(card);
            });

            // Якщо немає папок, показати повідомлення
            if (folders.length === 0) {
              grid.innerHTML =
                '<p class="text-center text-gray-500 col-span-full">Нет публичных папок</p>';
            }
          })
          .catch((error) => {
            console.error("Помилка завантаження папок:", error);
            const grid = document.getElementById("folders-grid");
            grid.innerHTML =
              '<p class="text-center text-red-500 col-span-full">Ошибка загрузки данных</p>';
          });
      });
    </script>
  </body>
</html>

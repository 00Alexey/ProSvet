Поиск папок..."

    <!-- MODAL -->

              Другие пользователи смогут просматривать содержимое
            </p>
          </div>
          <label class="inline-flex relative items-center cursor-pointer">
            <input id="isPublic" type="checkbox" class="sr-only peer" />
            <div
              class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:bg-primary after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"
            ></div>
          </label>
        </div>

        <div class="flex justify-end gap-3 mt-6">
          <button
            onclick="closeModal()"

              this.style.backgroundColor = '';
              this.style.color = 'rgb(107,114,128)';
            "
          >
            Отменить
          </button>
          <button

            onclick="createFolder()"
            class="px-5 py-2 font-bold rounded-xl text-white transition-all duration-300 ease-in-out hover:scale-[1.04] active:scale-[0.97]"

              background: linear-gradient(
                135deg,

    <!-- ...existing code... -->

    <script src="/static/js/auth.js"></script>

    <script>
      function parseJwt(token) {
        try {
          return JSON.parse(atob(token.split(".")[1]));
        } catch {
          return null;
        }
      }

      // ✅ Отримуємо токен
      const token = localStorage.getItem("access_token");
      const payload = token ? parseJwt(token) : null;

      if (!token || !payload) {
        window.location.href = "/login";
      }

      const currentUser = payload?.user_id;
      const foldersKey = `folders_${currentUser}`;

      let folders = [];

      const grid = document.getElementById("foldersGrid");
      const empty = document.getElementById("emptyState");
      const count = document.getElementById("count");

      function updateUI() {
        count.textContent = `${folders.length} папок`;
        empty.classList.toggle("hidden", folders.length !== 0);
      }
      function formatDate(isoString) {
        if (!isoString) return "Только";

        const date = new Date(isoString);
        if (isNaN(date)) return "Только";

        const formattedDate = date.toLocaleDateString("uk-UA", {
          day: "numeric",
          month: "long",
          year: "numeric",
        });

        const formattedTime = date.toLocaleTimeString("uk-UA", {
          hour: "2-digit",
          minute: "2-digit",
        });

        return `${formattedDate}  ${formattedTime}`;
      }

      function renderFolders(list = folders) {
        grid.innerHTML = "";

        list.forEach((folder) => {
          const card = document.createElement("div");
          card.className =
            "group cursor-pointer bg-card border border-border rounded-2xl p-5 shadow-card hover:shadow-hover hover:-translate-y-1 transition";

          card.onclick = () => {
            window.location.href = `/folder?id=${folder.id}`;
          };

          card.innerHTML = `
          <div class="flex justify-between items-start">

            <!-- ПАПКА -->
            <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 7a2 2 0 0 1 2-2h4l2 2h10a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              </svg>
            </div>

      <!-- МЕНЮ (ТРИ ТОЧКИ) -->
      <div class="relative">
<button class="menu-btn opacity-0 group-hover:opacity-100 transition 
               w-9 h-9 flex items-center justify-center 
               border border-border rounded-xl bg-white 
               hover:bg-[rgb(46,184,172)] hover:text-white">
  ⋮
</button>

        <!-- Випадаюче меню -->
<div class="menu hidden absolute right-0 mt-2 bg-white border rounded-xl shadow-lg text-sm z-50">

  <button class="rename flex items-center px-4 py-2 hover:bg-gray-100 w-full text-left">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 20h9"/>
      <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
    </svg>
    Переименовать
  </button>


  <button class="delete flex items-center px-4 py-2 hover:bg-red-100 text-red-600 w-full text-left">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14H6L5 6"/>
      <path d="M10 11v6"/>
      <path d="M14 11v6"/>
      <path d="M9 6V4h6v2"/>
    </svg>
    Удалить
  </button>

</div>

      </div>

          </div>

          <h3 class="font-display font-semibold mt-3">${folder.name}</h3>
          <p class="text-sm text-gray-500">${folder.file_count} файлів</p>

          <div class="flex justify-between text-xs text-gray-400 mt-3">
            <span>${formatDate(folder.date)}</span>
            <span>
      ${
        folder.public
          ? `
        <span class="flex items-center gap-1 ">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M2 12h20" />
              <path d="M12 2a15 15 0 0 1 0 20" />
              <path d="M12 2a15 15 0 0 0 0 20" />
            </svg>
          Публично
        </span>`
          : `
        <span class="flex items-center gap-1 text-gray-500">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 11c.55 0 1 .45 1 1v2a1 1 0 11-2 0v-2c0-.55.45-1 1-1zm6-3h-1V7a5 5 0 00-10 0v1H6a2 2 0 00-2 2v9a2 2 0 002 2h12a2 2 0 002-2v-9a2 2 0 00-2-2z" />
          </svg>
          Частная
        </span>`
      }
            </span>
          </div>
        `;

          // ===== МЕНЮ ЛОГІКА =====
          const menuBtn = card.querySelector(".menu-btn");
          const menu = card.querySelector(".menu");

          menuBtn.onclick = (e) => {
            e.stopPropagation();
            menu.classList.toggle("hidden");
          };

          // Закрити меню при кліку поза ним
          document.addEventListener("click", () => {
            menu.classList.add("hidden");
          });

          // ===== ДІЇ МЕНЮ =====

          // Видалити
          card.querySelector(".delete").onclick = (e) => {
            e.stopPropagation();
            deleteFolder(folder.id);
          };

          // Перейменувати
          card.querySelector(".rename").onclick = (e) => {
            e.stopPropagation();
            renameFolder(folder.id, folder.name);
          };

          grid.appendChild(card);
        });

        count.textContent = `${list.length} папок`;
        empty.classList.toggle("hidden", list.length !== 0);
      }

      // ✅ НОВА: Завантажити папки з сервера
      async function loadFoldersFromServer() {
        try {
          const res = await fetch(`/files/folders?token=${token}`);

          if (!res.ok) {
            console.error("Ошибка при загрузке папок:", res.status);
            return;
          }

          const serverFolders = await res.json();
          console.log("📥Папки с сервера:", serverFolders);

          // Конвертувати формат з сервера в локальний
          // Конвертувати формат з сервера в локальний
          folders = serverFolders.map((f) => ({
            id: f.id,
            name: f.name,
            public: f.is_public ? true : false,
            comment: f.comment || "",
            file_count: f.file_count || 0, // Додаємо кількість файлів
            date: f.created_at || new Date().toISOString(),
          }));

          // Зберегти локально
          localStorage.setItem(foldersKey, JSON.stringify(folders));
          renderFolders();
        } catch (error) {
          console.error("Ошибка синхронизации папок:", error);
          // Якщо сервер недоступний - використати локальні папки
          folders = JSON.parse(localStorage.getItem(foldersKey)) || [];
          renderFolders();
        }
      }

      function openModal() {
        const modal = document.getElementById("modal");
        modal.classList.remove("hidden");
        modal.classList.add("flex");

        // reset
        document.getElementById("isPublic").checked = false;
        document.getElementById("commentBlock").classList.add("hidden");
        document.getElementById("folderName").value = "";
        document.getElementById("folderComment").value = "";
        updateCreateButtonState();
      }
      const isPublicCheckbox = document.getElementById("isPublic");
      const commentBlock = document.getElementById("commentBlock");

      isPublicCheckbox.addEventListener("change", () => {
        if (isPublicCheckbox.checked) {
          commentBlock.classList.remove("hidden");
        } else {
          commentBlock.classList.add("hidden");
          document.getElementById("folderComment").value = "";
          updateCreateButtonState(); // очистити
        }
      });

      function updateCreateButtonState() {
        const name = document.getElementById("folderName").value.trim();
        const createBtn = document.getElementById("createBtn");
        if (name) {
          createBtn.disabled = false;
          createBtn.style.opacity = "1";
          createBtn.style.background =
            "linear-gradient(135deg, hsla(200, 80%, 50%, 0.94), hsl(175 60% 45%))";
        } else {
          createBtn.disabled = true;
          createBtn.style.opacity = "0.5";
          createBtn.style.background = "#ccc";
        }
      }

      document
        .getElementById("folderName")
        .addEventListener("input", updateCreateButtonState);

      function closeModal() {
        const modal = document.getElementById("modal");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
        document.getElementById("folderName").value = "";
        document.getElementById("isPublic").checked = false;
      }

      // ✅ НОВА: Створити папку на сервері
      async function createFolder() {
        const name = document.getElementById("folderName").value.trim();
        const isPublic = document.getElementById("isPublic").checked;
        const comment = document.getElementById("folderComment").value.trim();

        if (!name) return;

        try {
          const formData = new FormData();
          formData.append("folder_name", name);
          formData.append("is_public", isPublic);
          formData.append("comment", comment); // ✅ ДОДАЛИ

          const res = await fetch(`/files/create-folder?token=${token}`, {
            method: "POST",
            body: formData,
          });

          const data = await res.json();

          if (!res.ok) {
            alert(`Ошибка: ${data.detail}`);
            return;
          }
          folders.push({
            id: data.id,
            name: data.name,
            public: isPublic,
            comment: comment,
            file_count: 0, // ✅ ВАЖЛИВО
            date: new Date().toISOString(),
          });

          localStorage.setItem(foldersKey, JSON.stringify(folders));
          closeModal();
          renderFolders();
        } catch (error) {
          console.error("Ошибка:", error);
        }
      }

      async function renameFolder(folderId, oldName) {
        const newName = prompt("Новое название папки:", oldName);
        if (!newName || newName === oldName) return;

        try {
          const res = await fetch(
            `/files/rename-folder/${folderId}?token=${token}`,
            {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ name: newName }),
            },
          );

          const data = await res.json();

          if (!res.ok) {
            alert("Ошибка: " + (data.detail || "Не удалось переименовать"));
            return;
          }

          // Оновлюємо локальний список
          const folder = folders.find((f) => f.id === folderId);
          if (folder) folder.name = newName;

          localStorage.setItem(foldersKey, JSON.stringify(folders));
          renderFolders();
        } catch (error) {
          console.error("Ошибка:", error);
          alert("Ошибка при переименовании папки");
        }
      }

      async function deleteFolder(folderId) {
        if (!confirm("Удалить папку навсегда?")) return;

        try {
          const res = await fetch(
            `/files/delete-folder/${folderId}?token=${token}`,
            {
              method: "DELETE",
            },
          );

          const data = await res.json();

          if (!res.ok) {
            alert("Ошибка: " + data.detail);
            return;
          }

          console.log("🗑️ Удалено:", data);

          // Видаляємо з локального списку
          folders = folders.filter((f) => f.id !== folderId);
          localStorage.setItem(foldersKey, JSON.stringify(folders));
          renderFolders();
        } catch (err) {
          console.error("Ошибка удаления:", err);
        }
      }

      const searchInput = document.getElementById("searchInput");

      searchInput.addEventListener("input", () => {
        const query = searchInput.value.toLowerCase().trim();

        if (query === "") {
          renderFolders(); // показати всі папки
          return;
        }

        const filteredFolders = folders.filter((folder) =>
          folder.name.toLowerCase().includes(query),
        );

        renderFolders(filteredFolders);
      });

      // User info + logout
      if (payload) {
        const userNameEl = document.getElementById("userName");
        const userEmailEl = document.getElementById("userEmail");
        const avatarEl = document.getElementById("avatar");

        if (userNameEl)
          userNameEl.textContent =
            payload.email?.split("@")[0] || "Пользователь";

        if (userEmailEl) userEmailEl.textContent = payload.email || "";

        if (avatarEl)
          avatarEl.textContent = (payload.email?.[0] || "K").toUpperCase();
      }

      const logoutBtn = document.getElementById("logoutBtn");
      if (logoutBtn) {
        logoutBtn.onclick = () => {
          localStorage.removeItem("access_token");
          localStorage.removeItem("current_user_id");
          localStorage.removeItem(foldersKey);
          window.location.href = "/index";
        };
      }
      // ✅ При завантаженні сторінки - синхронізувати папки з сервера
      window.addEventListener("load", () => {
        loadFoldersFromServer();
      });
    </script>
  </body>
</html>

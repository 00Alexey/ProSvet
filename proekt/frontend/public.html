<!-- proekt/frontend/public.html -->
<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>ProSvet — Публичные материалы</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: "hsl(210 20% 98%)",
              foreground: "hsl(222 47% 11%)",
              card: "hsl(0 0% 100%)",
              muted: "hsl(210 15% 95%)",
              border: "hsl(210 20% 90%)",
              primary: "hsl(200 80% 50%)",
              textMuted: "hsl(215 16% 47%)",
            },
            fontFamily: {
              sans: ["Inter", "system-ui"],
              display: ["Plus Jakarta Sans", "system-ui"],
            },
            backgroundImage: {
              "gradient-primary":
                "linear-gradient(135deg, hsla(200,80%,50%,0.94), hsl(175 60% 45%))",
            },
          },
        },
      };
    </script>

    <style>
      :root {
        --gradient-primary: linear-gradient(
          135deg,
          hsla(200, 80%, 50%, 0.94),
          hsl(175 60% 45%)
        );
      }
    </style>
  </head>

  <body class="bg-background font-sans">
    <div class="flex min-h-screen">
      <!-- SIDEBAR -->
      <aside class="w-64 bg-white border-r border-border flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-border">
          <div
            class="w-10 h-10 rounded-xl flex items-center justify-center overflow-hidden"
          >
            <img
              src="static/goose.jpg"
              alt="ProSvet Logo"
              class="w-6 h-6 object-contain"
            />
          </div>

          <span class="ml-3 font-display font-bold text-xl">ProSvet</span>
          <div class="absolute top-16 left-0 w-full h-px bg-border"></div>
        </div>

        <nav class="flex-1 px-5 py-6 space-y-2">
          <a
            class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 font-extrabold text-sm hover:text-primary hover:bg-gray-200 transition-colors"
            href="/notebook"
          >
            <!-- Open folder icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke="gray"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <!-- Клапан відкритої папки -->
              <path
                d="M 3 7 h6 l2 3 h10 a 2 2 0 0 1 2 2 v9 a 2 2 0 0 1-2 2 H3 a2 2 0 0 1-2-2 V10 a2 2 0 0 1 2-2z h1"
              />
              <!-- Внутрішня лінія, щоб показати “відкриття” -->
              <path d="M3 10h18" />
            </svg>
            Мой блокнот
          </a>

          <a
            class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 font-extrabold text-sm hover:text-primary hover:bg-gray-200 transition-colors"
          >
            <!-- Globe icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M2 12h20" />
              <path d="M12 2a15 15 0 0 1 0 20" />
              <path d="M12 2a15 15 0 0 0 0 20" />
            </svg>
            <span>Публичное</span>
          </a>

          <a
            class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 font-extrabold text-sm hover:text-primary hover:bg-gray-200 transition-colors"
            href="/settings"
          >
            <!-- Settings icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l0 0a2 2 0 1 1-2.83 2.83l0 0a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v0a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l0 0a2 2 0 1 1-2.83-2.83l0 0a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h0a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l0 0a2 2 0 1 1 2.83-2.83l0 0a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v0a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l0 0a2 2 0 1 1 2.83 2.83l0 0a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h0a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
            <span>Настройка</span>
          </a>
        </nav>

        <!-- USER INFO + LOGOUT -->
        <div class="p-4 border-t border-border">
          <!-- USER CARD -->
          <!-- <div
            class="flex items-center gap-3 px-2 py-2 rounded-xl hover:bg-muted transition"
          >
            <div
              class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold"
              style="background: var(--gradient-primary)"
            >
              K
            </div>

            <div class="flex flex-col leading-tight">
              <span class="font-semibold text-sm text-foreground">
                Користувач
              </span>
              <span class="text-xs text-gray-500"> user@example.com </span>
            </div>
          </div> -->
          <a
            id="logoutLink"
            class="flex items-center gap-2 px-3 py-2 rounded-xl text-gray-500 font-bold cursor-pointer transition-colors duration-200"
            style="--hover-bg: rgb(46, 184, 172)"
            onmouseover="
              this.style.backgroundColor = 'var(--hover-bg)';
              this.style.color = 'red';
            "
            onmouseout="
              this.style.backgroundColor = '';
              this.style.color = 'gray';
            "
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <!-- двері -->
              <path d="M3 3h12v18H3z" />
              <!-- стрілка -->
              <path d="M16 12h5" />
              <path d="M19 9l3 3-3 3" />
            </svg>

            Выйти
          </a>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="flex-1 p-8">
        <!-- ЛОГОТИП ПО ЦЕНТРУ -->
        <div class="flex flex-col items-center text-center mt-10 mb-12">
          <div
            class="w-12 h-12 rounded-xl text-white flex items-center justify-center shadow-xl"
            style="background: var(--gradient-primary)"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-10 h-10"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M2 12h20" />
              <path d="M12 2a15 15 0 0 1 0 20" />
              <path d="M12 2a15 15 0 0 0 0 20" />
            </svg>
          </div>

          <h2 class="mt-4 text-4xl font-display font-bold">
            Публичные материалы
          </h2>

          <p class="text-xl text-gray-500 font-medium">
            Просматривайте материалы, которые пользователи сделали доступными
            для всех
          </p>
        </div>

        <!-- ПОШУК -->
        <div class="mb-8 flex justify-center">
          <div class="flex gap-2">
            <input
              id="searchInput"
              type="text"
              placeholder="
Поиск материалов..."
              class="w-[450px] px-3 py-2 rounded-xl border border-border bg-white focus:outline-none focus:ring-2 focus:ring-primary"
            />
          </div>
        </div>

        <!-- СІТКА МАТЕРІАЛІВ -->
        <div
          id="foldersGrid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
        ></div>

        <!-- ПУСТИЙ СТАН -->
      </main>
    </div>

    <script>
      (function () {
        const grid = document.getElementById("foldersGrid");
        const searchInput = document.getElementById("searchInput");
        const refreshBtn = document.getElementById("refreshBtn");

        function getEmojiAndColor(type) {
          const config = {
            folder: { emoji: "📁", color: "#8B5CF6" },
            image: { emoji: "🖼️", color: "#EC4899" },
            video: { emoji: "🎥", color: "#F59E0B" },
            audio: { emoji: "🎵", color: "#06B6D4" },
            document: { emoji: "📄", color: "#3B82F6" },
          };
          return config[type] || { emoji: "📄", color: "#3B82F6" };
        }

        async function loadPublicFiles() {
          try {
            const token =
              localStorage.getItem("token") ||
              localStorage.getItem("access_token");

            const url = "/files/public";

            const res = await fetch(url, {
              headers: token
                ? {
                    Authorization: `Bearer ${token}`,
                  }
                : {},
            });

            if (!res.ok) throw new Error("network");

            const items = await res.json();
            console.log("[DEBUG] Public items:", items);
            grid.innerHTML = "";

            if (!items || items.length === 0) {
              grid.innerHTML =
                '<div class="text-gray-500 col-span-3 text-center">Нема публічних матеріалів</div>';
              return;
            }

            for (const item of items) {
              console.log(
                "[DEBUG] Item:",
                item,
                "can_delete:",
                item.can_delete,
              );
              const card = document.createElement("div");
              card.className =
                "group cursor-pointer bg-card border border-border rounded-2xl p-5 shadow-card hover:shadow-hover hover:-translate-y-1 transition";

              if (item.type === "folder") {
                card.onclick = () => {
                  window.location.href = `/public-folder?id=${item.folder_id}`;
                };
              }

              card.innerHTML = `
<div class="flex justify-between items-start">

  <!-- ІКОНА ПАПКИ -->
  <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-primary"
         viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 7a2 2 0 0 1 2-2h4l2 2h10a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    </svg>
  </div>

  ${
    item.can_delete
      ? `<button
        onclick="deleteFolderById('${item.folder_id}', event)"
        class="text-red-500 hover:text-red-700"
     >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5"
             viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/>
          <path d="M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
     </button>`
      : ""
  }

</div>

      <h3 class="font-display font-semibold mt-3">${item.name}</h3>
      <p class="font-semibold text-sm text-gray-500">файлів ${item.file_count || 0}</p>
      <p class="font-semibold text-sm text-yellow-500">
        ${renderStars(item.average_rating || 0)}
        <span class="text-gray-500">(${item.rating_count || 0})</span>
      </p>
      <p class="flex items-center justify-between font-semibold text-sm text-gray-500">

        <!-- ЛІВА СТОРОНА: коментарі -->
        <span class="flex items-center gap-1">
          ${item.comment_count || 0}
          <svg xmlns="http://www.w3.org/2000/svg"
               class="w-4 h-4 text-gray-400"
               fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="14" rx="2" ry="2"/>
            <path d="M7 21l3-4h8"/>
          </svg>
        </span>

        <!-- ПРАВА СТОРОНА: публічний -->
        <svg xmlns="http://www.w3.org/2000/svg"
             class="w-4 h-4 text-gray-400"
             viewBox="0 0 24 24"
             fill="none"
             stroke="currentColor"
             stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <path d="M2 12h20" />
          <path d="M12 2a15 15 0 0 1 0 20" />
          <path d="M12 2a15 15 0 0 0 0 20" />
        </svg>

      </p>

      `;
              grid.appendChild(card);
            }
          } catch (e) {
            console.error(e);
            grid.innerHTML =
              '<div class="text-red-500 col-span-3 text-center">Ошибка загрузки</div>';
          }
        }
        document.getElementById("logoutLink").onclick = () => {
          localStorage.removeItem("access_token");
          localStorage.removeItem("token");
          localStorage.removeItem("current_user_id");
          window.location.href = "/index";
        };

        function renderStars(rating) {
          const maxStars = 5;
          let full = Math.floor(rating);
          let half = rating % 1 >= 0.5 ? 1 : 0;
          let empty = maxStars - full - half;

          return "★".repeat(full) + "★".repeat(half) + "☆".repeat(empty);
        }
        function applyFilter() {
          const q = (searchInput.value || "").trim().toLowerCase();
          Array.from(grid.children).forEach((card) => {
            const t =
              card
                .querySelector(".text-foreground")
                ?.textContent.toLowerCase() || "";
            card.style.display = t.includes(q) ? "block" : "none";
          });
        }

        async function deleteFolderById(folderId, event) {
          event.stopPropagation();

          const token =
            localStorage.getItem("token") ||
            localStorage.getItem("access_token");

          if (!token) {
            alert("Пожалуйста, авторизуйтесь");
            return;
          }

          if (!confirm("Вы уверены, что хотите удалить папку?")) return;

          try {
            const res = await fetch(
              `/files/delete-folder/${folderId}?token=${token}`,
              {
                method: "DELETE",
              },
            );

            if (!res.ok) {
              const error = await res.json();
              throw new Error(error.detail || "Ошибка удаления папки");
            }

            alert("✅ Папка успешно удалена");
            loadPublicFiles();
          } catch (e) {
            alert("❌ Ошибка: " + e.message);
          }
        }

        window.deleteFolderById = deleteFolderById;
        document.addEventListener("DOMContentLoaded", () => {
          loadPublicFiles();
          searchInput.addEventListener("input", applyFilter);
          refreshBtn.addEventListener("click", loadPublicFiles);
        });
      })();
    </script>
  </body>
</html>
